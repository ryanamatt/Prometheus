name: Release Prometheus

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Package for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: prometheus-linux.tar.gz
          - os: windows-latest
            asset_name: prometheus-windows.zip
          - os: macos-latest
            asset_name: prometheus-macos.tar.gz

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up MSYS2 (Windows only)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: make mingw-w64-ucrt-x86_64-gcc

      - name: Build Prometheus (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
            make clean
            make

      - name: Build Prometheus (Unix)
        if: matrix.os != 'windows-latest'
        run: |
            make clean
            make

      - name: Package Assets (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          mkdir release_dist
          cp prometheus.exe release_dist/
          cp -r stdlib release_dist/
          Compress-Archive -Path release_dist/* -DestinationPath ${{ matrix.asset_name }}

      - name: Package Assets (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir release_dist
          cp prometheus release_dist/
          cp -r stdlib release_dist/
          tar -czvf ${{ matrix.asset_name }} -C release_dist .

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}