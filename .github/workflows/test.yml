name: Prometheus Tests Multi-Platform

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  test:
    name: ${{ matrix.os }} (GCC)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up MSYS2 (Windows only)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            make
            mingw-w64-ucrt-x86_64-gcc

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Build Prometheus (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: make

      - name: Build Prometheus (Unix)
        if: matrix.os != 'windows-latest'
        run: make

      # --- Run Tests ---

      - name: Run Pytest Suite
        run: pytest -v